name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 2.1.0)'
        required: true
        default: '2.1.0'

jobs:
  release:
    name: Build and Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.os == 'windows-latest' && 'x86_64-pc-windows-msvc' || 'x86_64-apple-darwin,aarch64-apple-darwin' }}

      - name: Install Dependencies
        run: npm ci

      - name: Build Native Audio Module
        run: npm run build:native

      - name: Download macOS Whisper Binaries (macOS only)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets/whisper-bin
          # Download latest release binaries from ggerganov/whisper.cpp
          # Note: If official zips aren't available, we could build from source here,
          # but for now we attempt to fetch community or official releases.
          echo "Fetching macOS binaries..."
          # Fallback: We can build from source if needed
          git clone --depth 1 https://github.com/ggerganov/whisper.cpp.git whisper-src
          cd whisper-src
          # Build both CLI and Server with Metal support (optimized for Apple Silicon/Intel)
          make whisper-cli whisper-server -j4
          cp whisper-cli ../assets/whisper-bin/whisper-cli
          cp whisper-server ../assets/whisper-bin/whisper-server
          cd ..
          rm -rf whisper-src

      - name: Build and Publish Electron App
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_SKIP_SIGNING: true
        run: npm run dist -- -c.extraMetadata.version=${{ github.event.inputs.version }}
